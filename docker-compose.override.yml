services:
  api:
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
      - media_data:/app/media

  celery-worker:
    volumes:
      - .:/app
      - media_data:/app/media

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
